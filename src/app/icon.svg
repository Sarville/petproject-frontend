<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#060d0a"/>
  <!-- Terminal titlebar — контрастная полоса -->
  <rect x="0" y="0" width="32" height="9" rx="6" fill="#1a2e22"/>
  <rect x="0" y="5" width="32" height="4" fill="#1a2e22"/>
  <!-- Traffic lights — крупнее и ярче -->
  <circle cx="7"  cy="4.5" r="2.2" fill="#ff453a"/>
  <circle cx="14" cy="4.5" r="2.2" fill="#ffd60a"/>
  <circle cx="21" cy="4.5" r="2.2" fill="#30d158"/>
  <!-- Разделитель -->
  <line x1="0" y1="9" x2="32" y2="9" stroke="#2d4a38" stroke-width="1"/>
  <!-- Prompt: треугольник вместо текста > -->
  <polygon points="4,13 4,19 8,16" fill="#00ff88"/>
  <!-- Курсор: прямоугольник _ -->
  <rect x="10" y="17" width="6" height="2.5" rx="1" fill="#00ff88"/>
  <!-- Синусоида — толще, ярче, полная непрозрачность -->
  <path d="M3,26 Q6,22 9,26 Q12,30 15,26 Q18,22 21,26 Q24,30 27,26 Q29,24 30,25"
        fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
</svg>
