      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
